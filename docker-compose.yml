version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: thai-auto-parts-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: thai_auto_parts
      MYSQL_USER: thai_user
      MYSQL_PASSWORD: thai_pass_2024
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: thai-auto-parts-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thai-auto-parts-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/thai_auto_parts?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: thai_user
      SPRING_DATASOURCE_PASSWORD: thai_pass_2024
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: your-jwt-secret-key-change-in-production
      SERP_API_KEY: ${SERP_API_KEY}
      PHANTOMBUSTER_API_KEY: ${PHANTOMBUSTER_API_KEY}
    depends_on:
      - mysql
      - redis
    volumes:
      - ./logs:/app/logs

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: thai-auto-parts-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  # Python爬虫服务
  crawler:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    container_name: thai-auto-parts-crawler
    restart: always
    environment:
      API_URL: http://backend:8080/api
      SERP_API_KEY: ${SERP_API_KEY}
      PHANTOMBUSTER_API_KEY: ${PHANTOMBUSTER_API_KEY}
    depends_on:
      - backend
    volumes:
      - ./crawler/data:/app/data
      - ./crawler/logs:/app/logs

volumes:
  mysql_data:
  redis_data:
